{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="fade-in">
        <header class="flex flex-col md:flex-row items-center gap-10 mb-20 border-b border-gray-100 pb-16">
            <img class="w-24 h-24 rounded-full grayscale border border-gray-200" src="{{ user.profile.image.url }}" alt="{{ user.username }}">
            <div class="text-center md:text-left">
                <h1 class="text-4xl heading-serif mb-2">{{ user.username }}</h1>
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest underline mb-4">{{ user.email }}</p>
                <span class="text-[9px] px-3 py-1 border border-gray-200 text-gray-400 uppercase tracking-widest font-bold">CONTRIBUTOR STATUS: ACTIVE</span>
            </div>
        </header>

        <div class="max-w-xl">
            <h2 class="text-lg font-bold uppercase tracking-widest mb-10 pb-2 border-b-2 border-black inline-block">Refine Identity</h2>
            
            <form method="POST" enctype="multipart/form-data" class="space-y-10">
                {% csrf_token %}
                <div class="space-y-8">
                    {{ u_form|crispy }}
                    {{ p_form|crispy }}
                </div>
                
                <div class="pt-10">
                    <button class="btn-minimal rounded-sm px-12 py-4" type="submit">
                        Update
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
