{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="card-technical p-10 animate-slide-up bg-white relative overflow-hidden">
        <header class="flex flex-col md:flex-row items-center gap-10 mb-12 border-b border-slate-100 pb-12">
            <div class="relative">
                <img class="w-32 h-32 rounded-lg border-2 border-mongo-blue shadow-lg bg-white" src="{{ user.profile.image.url }}" alt="{{ user.username }}">
                <div class="absolute -bottom-2 -right-2 bg-mongo-blue text-white p-1.5 rounded-md shadow-md">
                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                </div>
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-bold text-mongo-navy mb-1 tracking-tight">{{ user.username }}</h1>
                <p class="text-mongo-gray font-medium mb-4">{{ user.email }}</p>
                <div class="flex gap-2">
                    <span class="accent-pill bg-blue-600 text-white">CONTRIBUTOR</span>
                    <span class="accent-pill bg-slate-100 text-slate-500">ID: {{ user.id|add:"1000" }}</span>
                </div>
            </div>
        </header>

        <div class="max-w-2xl">
            <h2 class="text-xl font-bold text-mongo-navy mb-8 flex items-center gap-3">
                <i data-lucide="database" class="w-5 h-5 text-mongo-blue"></i>
                Synchronize Profile Data
            </h2>
            
            <form method="POST" enctype="multipart/form-data" class="space-y-8">
                {% csrf_token %}
                <div class="space-y-6 text-sm text-mongo-navy">
                    {{ u_form|crispy }}
                    {{ p_form|crispy }}
                </div>
                
                <div class="pt-8 border-t border-slate-100">
                    <button class="btn-mongo px-12 py-3" type="submit">
                        <i data-lucide="refresh-cw" class="w-4 h-4 mr-1"></i>
                        Update Archive
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
