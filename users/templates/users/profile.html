{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="max-w-2xl mx-auto">
        <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 lg:p-12 shadow-sm animate-fade-in relative overflow-hidden">
            <!-- Background decorative element -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>

            <div class="relative z-10">
                <header class="flex flex-col md:flex-row items-center gap-8 mb-12 border-b border-slate-100 pb-12">
                    <div class="relative group">
                        <img class="w-32 h-32 rounded-full border-4 border-white shadow-xl group-hover:scale-105 transition-transform duration-500" src="{{ user.profile.image.url }}" alt="{{ user.username }}">
                        <div class="absolute inset-0 rounded-full border border-primary/20 scale-110 group-hover:scale-125 transition-transform opacity-0 group-hover:opacity-100 duration-500"></div>
                    </div>
                    <div class="text-center md:text-left">
                        <h1 class="text-3xl font-heading font-bold text-slate-900">{{ user.username }}</h1>
                        <p class="text-slate-500 font-medium mb-4">{{ user.email }}</p>
                        <div class="flex flex-wrap justify-center md:justify-start gap-2">
                            <span class="px-4 py-1.5 bg-slate-50 text-slate-600 text-xs font-bold rounded-full border border-slate-100 uppercase tracking-widest">Member</span>
                            <!-- Add more badges if applicable -->
                        </div>
                    </div>
                </header>

                <div class="mb-12">
                    <h2 class="text-xl font-heading font-bold text-slate-900 mb-6 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-primary">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                        </svg>
                        Update Identity
                    </h2>
                    
                    <form method="POST" enctype="multipart/form-data" class="space-y-6">
                        {% csrf_token %}
                        <div class="space-y-6">
                            {{ u_form|crispy }}
                            {{ p_form|crispy }}
                        </div>
                        
                        <div class="pt-6 border-t border-slate-100">
                            <button class="px-10 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-primary transition-all shadow-xl shadow-slate-900/10 hover:shadow-primary/20 active:scale-95 flex items-center gap-2" type="submit">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
