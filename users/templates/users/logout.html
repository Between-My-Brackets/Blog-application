{% extends "blog/base.html" %}
{% block content %}
    <div class="card-technical max-w-md mx-auto p-12 text-center animate-slide-up">
        <div class="w-16 h-16 bg-blue-50 text-mongo-blue rounded-xl flex items-center justify-center mx-auto mb-8 shadow-sm">
            <i data-lucide="log-out" class="w-8 h-8"></i>
        </div>
        <h1 class="text-3xl font-bold text-mongo-navy mb-4 tracking-tight">Session Terminated</h1>
        <p class="text-mongo-gray text-sm mb-10 leading-relaxed">
            You have successfully signed out. Your authentication tokens have been cleared from this session.
        </p>
        <div class="flex flex-col gap-3">
             <a href="{% url 'login' %}" class="w-full btn-mongo py-3 justify-center">Sign In Again</a>
             <a href="{% url 'blog-home' %}" class="text-xs font-bold text-slate-400 hover:text-mongo-navy transition uppercase tracking-widest pt-4">Back to home</a>
        </div>
    </div>
{% endblock content %}
