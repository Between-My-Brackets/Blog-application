{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="max-w-md fade-in">
        <header class="mb-12">
            <h1 class="text-3xl heading-serif mb-2">Redefine</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Set your new security key.</p>
        </header>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div class="space-y-6">
                {{ form|crispy }}
            </div>
            
            <button class="w-full btn-minimal rounded-sm py-4" type="submit">
                Save New Key
            </button>
        </form>
    </div>
{% endblock content %}
