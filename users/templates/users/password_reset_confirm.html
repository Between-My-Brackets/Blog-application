{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="card-technical max-w-md mx-auto p-12 text-center animate-slide-up">
        <div class="w-16 h-16 bg-blue-50 text-mongo-blue rounded-xl flex items-center justify-center mx-auto mb-8 shadow-sm">
            <i data-lucide="lock" class="w-8 h-8"></i>
        </div>
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-mongo-navy mb-2 tracking-tight">Redefine Access</h1>
            <p class="text-mongo-gray text-sm">Synchronize your new security credentials.</p>
        </header>

        <form method="POST" class="space-y-6 text-left">
            {% csrf_token %}
            <div class="space-y-6 text-sm text-mongo-navy">
                {{ form|crispy }}
            </div>
            
            <button class="w-full btn-mongo py-3 justify-center" type="submit">
                Initialize New Key
            </button>
        </form>
    </div>
{% endblock content %}
