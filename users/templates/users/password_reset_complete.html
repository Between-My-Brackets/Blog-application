{% extends "blog/base.html" %}
{% block content %}
    <div class="card-technical max-w-md mx-auto p-12 text-center animate-slide-up">
        <div class="w-16 h-16 bg-blue-50 text-mongo-blue rounded-xl flex items-center justify-center mx-auto mb-8 shadow-sm">
            <i data-lucide="check-circle" class="w-8 h-8"></i>
        </div>
        <h1 class="text-3xl font-bold text-mongo-navy mb-4 tracking-tight">Access Restored</h1>
        <p class="text-mongo-gray text-sm mb-10 leading-relaxed">
            Your security tokens have been updated. You may now use your new credentials to sign in.
        </p>
        <a href="{% url 'login' %}" class="w-full btn-mongo py-3 justify-center">Sign In Now</a>
    </div>
{% endblock content %}
