{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="max-w-md fade-in">
        <header class="mb-12">
            <h1 class="text-3xl heading-serif mb-2">Welcome Back</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Please identify yourself.</p>
        </header>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div class="space-y-6">
                {{ form|crispy }}
            </div>
            
            <button class="w-full btn-minimal rounded-sm py-4" type="submit">
                Sign In
            </button>
        </form>

        <div class="mt-12 pt-8 border-t border-gray-100 flex flex-col gap-4">
            <a class="text-[10px] font-bold text-gray-400 hover:text-black uppercase tracking-widest" href="{% url 'password_reset' %}">Forgot security key?</a>
            <p class="text-xs text-gray-500">
                New here? <a class="font-bold text-black underline" href="{% url 'register' %}">Join the community</a>
            </p>
        </div>
    </div>
{% endblock content %}
