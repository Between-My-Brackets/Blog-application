{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="card-technical max-w-md mx-auto p-10 mt-10 animate-slide-up">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-mongo-navy mb-2 tracking-tight">Sign In</h1>
            <p class="text-mongo-gray text-sm">Access your developer dashboard.</p>
        </header>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-6 text-sm text-mongo-navy">
                {{ form|crispy }}
            </div>
            
            <button class="w-full btn-mongo py-3 justify-center" type="submit">
                Sign In to Database
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-100 text-center space-y-4">
            <a class="block text-xs font-bold text-mongo-blue hover:underline uppercase tracking-widest" href="{% url 'password_reset' %}">Request New Password</a>
            <p class="text-xs text-mongo-gray">
                No account? <a class="font-bold text-mongo-navy hover:text-mongo-blue transition underline" href="{% url 'register' %}">Create account now</a>
            </p>
        </div>
    </div>
{% endblock content %}
