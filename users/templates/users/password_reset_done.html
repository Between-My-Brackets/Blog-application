{% extends "blog/base.html" %}
{% block content %}
    <div class="max-w-md fade-in">
        <header class="mb-12">
            <h1 class="text-3xl heading-serif mb-2">Dispatched</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Check your inbox for the instructions.</p>
        </header>
        <p class="text-sm text-gray-500 leading-relaxed mb-10">
            A message has been sent with a link to reset your security key. If it doesn't arrive soon, check your spam folder.
        </p>
        <a href="{% url 'login' %}" class="btn-minimal rounded-sm py-3 px-8 text-xs inline-block">Back to Sign In</a>
    </div>
{% endblock content %}
