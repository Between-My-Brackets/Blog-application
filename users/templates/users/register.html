{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="max-w-xl mx-auto">
        <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 lg:p-12 shadow-sm animate-fade-in relative overflow-hidden">
            <!-- Background decorative element -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>

            <div class="relative z-10">
                <header class="mb-10">
                    <h1 class="text-3xl font-heading font-bold text-slate-900 mb-2">Join the <span class="text-primary italic">Community</span>.</h1>
                    <p class="text-slate-500">Start sharing your thoughts with the world today.</p>
                </header>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <div class="space-y-4">
                        {{ form|crispy }}
                    </div>
                    
                    <div class="pt-4">
                        <button class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-primary transition-all shadow-xl shadow-slate-900/10 hover:shadow-primary/20 active:scale-95 flex items-center justify-center gap-2" type="submit">
                            Register Now
                        </button>
                    </div>
                </form>

                <div class="mt-10 pt-8 border-t border-slate-100 text-center">
                    <p class="text-sm text-slate-500">
                        Already have an account? <a class="font-bold text-slate-900 hover:text-primary transition-colors" href="{% url 'login' %}">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
