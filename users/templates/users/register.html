{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="max-w-md fade-in">
        <header class="mb-12">
            <h1 class="text-3xl heading-serif mb-2">Join</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Become part of the archive.</p>
        </header>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div class="space-y-6">
                {{ form|crispy }}
            </div>
            
            <button class="w-full btn-minimal rounded-sm py-4" type="submit">
                Create Account
            </button>
        </form>

        <div class="mt-12 pt-8 border-t border-gray-100">
            <p class="text-xs text-gray-500">
                Already registered? <a class="font-bold text-black underline" href="{% url 'login' %}">Sign In</a>
            </p>
        </div>
    </div>
{% endblock content %}
