{% extends "blog/base.html" %}
{% block content %}
    <div class="card-technical max-w-2xl mx-auto p-16 text-center animate-slide-up">
        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-10 shadow-sm border border-red-100">
            <i data-lucide="server-crash" class="w-10 h-10"></i>
        </div>
        <h1 class="text-7xl font-bold text-slate-100 mb-4">500</h1>
        <h2 class="text-3xl font-bold text-mongo-navy mb-4 tracking-tight">Internal Server Error</h2>
        <p class="text-mongo-gray text-base mb-12">An unexpected exception occurred during query execution. Our DevOps team has been alerted.</p>
        <a href="{% url 'blog-home' %}" class="btn-mongo px-12 py-4 text-base shadow-lg shadow-blue-500/10">Retry Connection</a>
    </div>
{% endblock content %}
