{% extends "blog/base.html" %}
{% block content %}

        <div class="w-20 h-20 bg-blue-50 text-mongo-blue rounded-2xl flex items-center justify-center mx-auto mb-10 shadow-sm border border-blue-100">
            <i data-lucide="search-x" class="w-10 h-10"></i>
        </div>

        <a href="{% url 'blog-home' %}" class="btn-mongo px-12 py-4 text-base shadow-lg shadow-blue-500/10">Back to Cluster Home</a>
    </div>
{% endblock content %}
