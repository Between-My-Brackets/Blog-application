{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 lg:p-12 shadow-sm animate-fade-in relative overflow-hidden">
        <!-- Background decorative element -->
        <div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>

        <div class="relative z-10">
            <h1 class="text-3xl lg:text-4xl font-heading font-bold text-slate-900 mb-2">Create your <span class="text-primary tracking-tight">masterpiece</span>.</h1>
            <p class="text-slate-500 mb-12">Share your thoughts with the world in a beautiful atmosphere.</p>

            <form method="POST" class="space-y-8">
                {% csrf_token %}
                <div class="space-y-6">
                    {{ form|crispy }}
                </div>
                
                <div class="flex items-center gap-6 pt-6 border-t border-slate-100">
                    <button class="px-10 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-primary transition-all shadow-xl shadow-slate-900/10 hover:shadow-primary/20 active:scale-95 flex items-center gap-2" type="submit">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                        Publish Post
                    </button>
                    <a href="{% url 'blog-home' %}" class="text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors uppercase tracking-widest">Discard changes</a>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
