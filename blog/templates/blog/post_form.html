{% extends "blog/base.html" %}
{% load tailwind_filters %}

{% block content %}
    <div class="fade-in">
        <header class="mb-16">
            <h1 class="text-4xl heading-serif mb-4">Compose</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Write with clarity. Share with intent.</p>
        </header>

        <form method="POST" class="space-y-12">
            {% csrf_token %}
            <div class="prose-minimal space-y-8">
                {{ form|crispy }}
            </div>
            
            <div class="flex items-center gap-10 pt-10 border-t border-gray-100">
                <button class="btn-minimal rounded-sm" type="submit">
                    Publish Essay
                </button>
                <a href="{% url 'blog-home' %}" class="text-[10px] font-bold text-gray-400 hover:text-black transition uppercase tracking-widest">Discard</a>
            </div>
        </form>
    </div>
{% endblock content %}
