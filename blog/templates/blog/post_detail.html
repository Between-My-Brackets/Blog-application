{% extends "blog/base.html" %}
{% block content %}
  <article class="fade-in">
    <header class="mb-16">
        <div class="flex items-center gap-4 text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold mb-8">
            <span>{{ object.date_posted|date:"F d, Y" }}</span>
            <span class="w-1 h-1 bg-gray-200 rounded-full"></span>
            <span>{{ object.read_time }} min read</span>
        </div>
        
        <h1 class="text-4xl md:text-6xl heading-serif mb-10 leading-tight">{{ object.title }}</h1>

        <div class="flex items-center justify-between border-y border-gray-100 py-6">
            <div class="flex items-center gap-4">
                <img src="{{ object.author.profile.image.url }}" class="w-10 h-10 rounded-full grayscale">
                <div>
                    <a class="text-xs font-bold uppercase tracking-widest hover:underline" href="{% url 'user-posts' object.author.username %}">{{ object.author }}</a>
                    <p class="text-[10px] text-gray-400">Contributor</p>
                </div>
            </div>
            
            {% if object.author == user %}
                <div class="flex gap-6">
                    <a class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-black transition" href="{% url 'post-update' object.id %}">Edit</a>
                    <a class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-red-500 transition" href="{% url 'post-delete' object.id %}">Delete</a>
                </div>
            {% endif %}
        </div>
    </header>

    <div class="prose-minimal mb-20">
        {{ object.content|linebreaks }}
    </div>

    <footer class="pt-20 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-10">
        <a href="{% url 'blog-home' %}" class="text-[10px] font-bold uppercase tracking-widest flex items-center gap-3 group">
            <i data-lucide="arrow-left" class="w-3 h-3 group-hover:-translate-x-1 transition-transform"></i>
            Library
        </a>
        <div class="flex gap-8">
            <button class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-black transition">Share on Twitter</button>
            <button class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-black transition">Copy Link</button>
        </div>
    </footer>
  </article>
{% endblock content %}
