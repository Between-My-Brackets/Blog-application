{% extends "blog/base.html" %}
{% block content %}
  <article class="card-technical">
    <header class="mb-10 border-b border-slate-100 pb-8">
        <div class="flex items-center gap-3 mb-6">
            <span class="accent-pill">Article</span>
            <span class="text-[11px] text-slate-400 font-bold uppercase tracking-widest">{{ object.date_posted|date:"F d, Y" }}</span>
        </div>
        
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-mongo-navy mb-8 leading-tight">{{ object.title }}</h1>

        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="{{ object.author.profile.image.url }}" class="w-10 h-10 rounded-full border border-white shadow-sm">
                <div>
                    <a class="text-sm font-bold text-mongo-navy hover:text-mongo-blue transition" href="{% url 'user-posts' object.author.username %}">{{ object.author }}</a>
                    <p class="text-[11px] text-slate-400 font-medium">{{ object.read_time }} min read</p>
                </div>
            </div>
            
            {% if object.author == user %}
                <div class="flex gap-3">
                    <a class="p-2 bg-slate-50 text-slate-400 hover:text-mongo-blue transition rounded border border-transparent hover:border-blue-100" href="{% url 'post-update' object.id %}">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </a>
                    <a class="p-2 bg-slate-50 text-slate-400 hover:text-red-500 transition rounded border border-transparent hover:border-red-100" href="{% url 'post-delete' object.id %}">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </a>
                </div>
            {% endif %}
        </div>
    </header>

    <div class="prose prose-slate lg:prose-lg max-w-none text-slate-700 leading-relaxed font-sans text-base md:text-lg selection:bg-blue-100">
        {{ object.content|linebreaks }}
    </div>

    <footer class="mt-12 pt-8 border-t border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Share:</span>
            <div class="flex gap-3">
                <button class="text-slate-400 hover:text-mongo-blue transition"><i data-lucide="twitter" class="w-4 h-4"></i></button>
                <button class="text-slate-400 hover:text-mongo-blue transition"><i data-lucide="linkedin" class="w-4 h-4"></i></button>
                <button class="text-slate-400 hover:text-mongo-blue transition"><i data-lucide="link" class="w-4 h-4"></i></button>
            </div>
        </div>
        <a href="{% url 'blog-home' %}" class="text-xs font-bold text-mongo-blue hover:underline">Return to Library</a>
    </footer>
  </article>
{% endblock content %}
